<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DOZEDEV Studio</title>

    <link rel="icon" href="../imagem/favicon-96x96.png">
    <link rel="stylesheet" href="/studio/style.css">
</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <div class="login-logo">
                <img src="../imagem/Logo.png" alt="DOZEDEV">
                <h1>Studio Area Cliente</h1>
            </div>

            <form class="login-form" id="loginForm">

                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="cliente@email.com"
                        required>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Senha</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Digite sua senha"
                        required>
                </div>

                <button type="submit" class="btn">
                    Entrar no Studio
                </button>

                <p class="login-help">
                    Ainda não tem acesso?
                    <a href="briefing.html">Preencher briefing</a>
                </p>

            </form>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/studio/config.js"></script>
    <script src="/studio/script.js"></script>

</body>
</html>
