<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DOZEDEV Studio</title>

    <link rel="icon" href="../imagem/favicon-96x96.png">
    <link rel="stylesheet" href="/studio/css/base.css">
    <link rel="stylesheet" href="/studio/css/forms.css">
    <link rel="stylesheet" href="/studio/css/layout.css">
    <link rel="stylesheet" href="/studio/css/dashboard.css">
    <link rel="stylesheet" href="/studio/css/modals.css">
    <link rel="stylesheet" href="/studio/css/components.css">
    <link rel="stylesheet" href="/studio/css/responsive.css">
</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <div class="login-logo">
                <a href="../index.html" aria-label="Voltar ao site DOZEDEV">
                    <img src="../imagem/Logo.png" alt="DOZEDEV">
                </a>
                <h1>Studio Area Cliente</h1>
            </div>

            <form class="login-form" id="loginForm">

                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="cliente@email.com"
                        required>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Senha</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Digite sua senha"
                        required>
                </div>

                <button type="submit" class="btn">
                    Entrar no Studio
                </button>
                <div class="login-divider">ou</div>

                <button
                    type="button"
                    id="openRegisterModal"
                    class="register-btn"
                >Criar Conta
                </button>

                <p class="login-help">
                    Ainda não tem acesso?
                    <a href="briefing.html">Preencher briefing</a>
                </p>

                <button
                    type="button"
                    id="resendConfirmationBtn"
                    class="register-btn"
                >
                    Reenviar email de confirmacao
                </button>

            </form>

        </section>

    </main>

    <!-- MODAL REGISTRO -->
<div class="auth-modal" id="registerModal">

  <div class="auth-modal-content">

    <button
      class="auth-close"
      id="closeRegisterModal"
    >
      ×
    </button>

    <h2>
      Criar Conta
    </h2>

    <form id="registerForm">

      <div class="input-group">

        <label>
          Nome
        </label>

        <input
          type="text"
          id="registerName"
          required
        >

      </div>

      <div class="input-group">

        <label>
          Email
        </label>

        <input
          type="email"
          id="registerEmail"
          required
        >

      </div>

      <div class="input-group">

        <label>
          Senha
        </label>

        <input
          type="password"
          id="registerPassword"
          required
        >

      </div>

      <div
        id="turnstileContainer"
        class="turnstile-container"
      ></div>

      <button class="btn" type="submit">
        Criar Conta
      </button>

    </form>

  </div>

</div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="/studio/config.js?v=20260721-2"></script>
    <script src="/studio/script.js?v=20260721-2"></script>

</body>
</html>
